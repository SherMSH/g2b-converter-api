variables:
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/g2b$CI_COMMIT_REF_SLUG" 
  TAG_LATEST: ":latest"

build:
  stage: build
  tags:
    - gitlab-runner-test
  image: docker:28
  script:
    - docker build -t "$IMAGE_NAME$TAG_LATEST" -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push --all-tags "$IMAGE_NAME"
  only:
    - main
    - dev
